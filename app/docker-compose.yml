services:
  web:
    build: ./php
    ports:
      - "6644:80"
    env_file:
      - .env
    volumes:
      - "./php/:/var/www/html"
    depends_on:
      - db

  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "9335:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data: