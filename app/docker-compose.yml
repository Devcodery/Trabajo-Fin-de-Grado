services:
  web:
    build: ./php
    ports:
      - "6644:80"
    env_file:
      - .env
    volumes:
      - "./php/:/var/www/html"
    depends_on:
      - db

  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "9335:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  tomcat:
    image: tomcat:9.0
    ports:
      - "7788:8080"
    volumes:
      - ./java/Proyecto_Grupo3/target/Proyecto_Grupo3-0.0.1-SNAPSHOT.war:/usr/local/tomcat/webapps/Proyecto_Grupo3.war

networks:
  proxy:
    external: true
    name: proxy

volumes:
  postgres_data: