services:
  web:
    build: .
    ports:
      - "6644:80"
    env_file:
      - .env
    volumes:
      - ".:/var/www/html"
    depends_on:
      - db

  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "9334:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: